name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # -----------------------------------------
  # STAGE 1: LINT
  # -----------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python - API
        run: flake8 api/main.py --max-line-length=120 --ignore=W503

      - name: Lint Python - Worker
        run: flake8 worker/worker.py --max-line-length=120 --ignore=W503

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint JavaScript
        run: cd frontend && npx eslint . --max-warnings=0

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint:latest-debian             hadolint --ignore DL3008 --ignore DL3009 - < api/Dockerfile
          docker run --rm -i hadolint/hadolint:latest-debian             hadolint --ignore DL3008 --ignore DL3009 - < worker/Dockerfile
          docker run --rm -i hadolint/hadolint:latest-debian             hadolint --ignore DL3008 --ignore DL3009 - < frontend/Dockerfile

  # -----------------------------------------
  # STAGE 2: TEST
  # -----------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-mock fakeredis httpx fastapi python-dotenv redis

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_api.py -v --tb=short \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -----------------------------------------
  # STAGE 3: BUILD
  # -----------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} \
                       -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} \
                       -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} \
                       -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

      - name: Verify all images in registry
        run: |
          curl -s http://localhost:5000/v2/_catalog
          echo "SHA used: ${{ github.sha }}"

  # -----------------------------------------
  # STAGE 4: SECURITY SCAN
  # -----------------------------------------
  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.70.0

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Scan API image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --ignore-unfixed --format sarif --output trivy-api.sarif localhost:5000/api:latest

      - name: Scan Worker image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --ignore-unfixed --format sarif --output trivy-worker.sarif localhost:5000/worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --ignore-unfixed --format sarif --output trivy-frontend.sarif localhost:5000/frontend:latest

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-reports
          path: trivy-*.sarif

  # -----------------------------------------
  # STAGE 5: INTEGRATION TEST
  # -----------------------------------------
  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=integrationtest123" > .env
          echo "APP_ENV=production" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            UNHEALTHY=$(docker compose ps | grep -c "starting\|unhealthy" || true)
            if [ "$UNHEALTHY" = "0" ]; then
              echo "All services healthy after $((i*5))s"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done
          docker compose ps

      - name: Submit a job through the API
        run: |
          JOB_RESPONSE=$(curl -sf -X POST http://localhost:8000/api/jobs \
            -H "Content-Type: application/json" \
            -d '{"type":"test","payload":{"message":"integration-check"}}')
          echo "Job response: $JOB_RESPONSE"
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes
        run: |
          echo "Polling job $JOB_ID..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:8000/api/jobs/$JOB_ID | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 3
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # -----------------------------------------
  # STAGE 6: DEPLOY (main branch only)
  # -----------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via rolling update
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" bash << 'REMOTE'
            set -e
            cd ~/hng14-stage2-devops

            git pull origin main

            docker compose up -d --no-deps --build api

            echo "Waiting for API health check..."
            TIMEOUT=60
            ELAPSED=0
            until docker compose exec -T api curl -sf http://localhost:8000/api/health\; do
              sleep 3
              ELAPSED=$((ELAPSED+3))
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Health check failed after ${TIMEOUT}s - rolling back"
                docker compose up -d --no-deps api
                exit 1
              fi
            done
            echo "API healthy - continuing"

            docker compose up -d --no-deps --build worker
            docker compose up -d --no-deps --build frontend

            echo "Deploy complete"
          REMOTE
