<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; }
    #jobs { margin-top: 20px; }
    .job { padding: 8px; border-bottom: 1px solid #ddd; }
    .error { color: red; }
    .completed { color: green; }
    .processing { color: orange; }
    .queued { color: blue; }
  </style>
</head>
<body>
  <h1>Job Processor Dashboard</h1>
  <button onclick="submitJob()">Submit New Job</button>
  <div id="result"></div>
  <div id="jobs"></div>

  <script>
    const MAX_POLL_ATTEMPTS = 30;
    const pollAttempts = {};

    async function submitJob() {
      try {
        const res = await fetch('/api/submit', { method: 'POST' });
        if (!res.ok) throw new Error('Submission failed');
        const data = await res.json();
        document.getElementById('result').innerText = `Submitted: ${data.job_id}`;
        pollAttempts[data.job_id] = 0;
        pollJob(data.job_id);
      } catch (err) {
        document.getElementById('result').innerHTML = `<span class="error">Error: ${err.message}</span>`;
      }
    }

    async function pollJob(id) {
      pollAttempts[id] = (pollAttempts[id] || 0) + 1;
      
      if (pollAttempts[id] > MAX_POLL_ATTEMPTS) {
        renderJob(id, 'timeout (exceeded retries)');
        return;
      }

      try {
        const res = await fetch(`/api/status/${id}`);
        if (res.status === 404) {
          renderJob(id, 'not found');
          return;
        }
        const data = await res.json();
        renderJob(id, data.status);
        
        if (data.status !== 'completed') {
          setTimeout(() => pollJob(id), 2000);
        }
      } catch (err) {
        renderJob(id, 'error fetching status');
        setTimeout(() => pollJob(id), 5000);
      }
    }

    function renderJob(id, status) {
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement('div');
        el.className = 'job';
        el.id = id;
        document.getElementById('jobs').appendChild(el);
      }
      const statusClass = status.replace(/\s+/g, '-').toLowerCase();
      el.innerHTML = `Job ${id.substring(0, 8)}... — <span class="${statusClass}">${status}</span>`;
    }
  </script>
</body>
</html>
